<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse my web development projects — full-stack apps, frontend designs, and backend APIs.">
  <title>Projects | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen">
    <div class="loader"></div>
  </div>

  <!-- Particle Background -->
  <canvas id="particles-canvas"></canvas>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">&#60;Dev /&#62;</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html" class="active">Projects</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Page Header -->
  <section class="section" style="padding-top: 140px; padding-bottom: 20px;">
    <div class="container">
      <div class="section-header">
        <span class="section-label">💼 Portfolio</span>
        <h1 class="section-title">My Projects</h1>
        <p class="section-description">
          Explore my work — from full-stack applications to frontend designs and backend APIs.
        </p>
      </div>

      <!-- Filters & Search -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="fullstack">Full Stack</button>
        <button class="filter-btn" data-filter="frontend">Frontend</button>
        <button class="filter-btn" data-filter="backend">Backend</button>
        <input type="text" class="search-input" id="project-search" placeholder="🔍 Search projects...">
      </div>
    </div>
  </section>

  <!-- Projects Grid -->
  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="projects-grid" id="projects-grid">
        <!-- Dynamically loaded from API -->
      </div>
    </div>
  </section>

  <!-- Project Modal -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal">
      <!-- Dynamically populated -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <a href="index.html" class="footer-logo">&#60;Dev /&#62;</a>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="projects.html">Projects</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>© 2026 Portfolio. Built with ❤️ using HTML, CSS, JavaScript & Node.js</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/projects.js"></script>
</body>
</html>
